name: 버그 제보
description: Focus Dolphin의 재현 가능한 문제를 알려 주세요
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        공개 이슈에 방문 기록, 차단 전 입력한 이유, 계정 정보, 화면 속 개인정보를 포함하지 마세요.
  - type: input
    id: browser
    attributes:
      label: 브라우저
      description: 사용한 브라우저 이름을 적어 주세요.
      placeholder: Naver Whale
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: 버전
      description: 브라우저 버전과 Focus Dolphin 버전을 적어 주세요.
      placeholder: "Whale 4.xx / Focus Dolphin 1.0.0"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 단계
      description: 민감한 도메인이나 입력 내용 대신 example.com 같은 예시를 사용해 주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 예상 결과
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 개인정보 확인
      options:
        - label: 방문 기록, 의도 입력, 계정 정보 또는 다른 개인정보를 포함하지 않았습니다.
          required: true
