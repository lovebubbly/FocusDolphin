<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusWhale Blocked</title>
    <style>
      :root {
        color: #162033;
        background: #f8fafc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      #app {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        box-sizing: border-box;
      }

      .shell {
        width: min(560px, 100%);
        display: grid;
        gap: 18px;
      }

      #pet-slot {
        width: 104px;
        height: 104px;
        border: 1px dashed #94a3b8;
        border-radius: 8px;
        background: #ffffff;
      }

      .eyebrow,
      .note,
      dt {
        color: #526070;
      }

      .eyebrow {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #0f172a;
        font-size: clamp(28px, 5vw, 44px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .facts {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        margin: 0;
      }

      .facts div {
        padding: 14px;
        border: 1px solid #dbe3ee;
        border-radius: 8px;
        background: #ffffff;
      }

      dt,
      dd {
        margin: 0;
      }

      dt {
        font-size: 13px;
      }

      dd {
        margin-top: 4px;
        font-size: 18px;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      #action-area,
      .form {
        display: grid;
        gap: 12px;
      }

      label {
        font-size: 14px;
        font-weight: 700;
      }

      input {
        min-height: 46px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 0 12px;
        font: inherit;
      }

      button {
        min-height: 52px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        color: #162033;
        font: inherit;
        font-size: 16px;
        cursor: pointer;
      }

      button.primary {
        background: #164e63;
        border-color: #164e63;
        color: #ffffff;
        font-weight: 700;
      }

      button:disabled {
        background: #e2e8f0;
        color: #64748b;
        cursor: wait;
      }

      .countdown {
        font-size: 28px;
        font-weight: 750;
      }
    </style>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main id="app">
      <div id="pet-slot"></div>
    </main>
  </body>
</html>
