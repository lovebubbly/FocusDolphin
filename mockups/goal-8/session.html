<!doctype html>
<html lang="en" data-theme="focuswhale-preview">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goal 8 · Session</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./mockup.css" />
    <link rel="stylesheet" href="./mockup-assets.css" />
    <script defer src="./mockup.js"></script>
  </head>
  <body class="mockup-stage m-0 font-sans">
    <nav class="mockup-controls" aria-label="Mockup controls">
      <a class="btn btn-ghost btn-sm" href="./index.html">← Goal 8</a>
      <strong>Session · 360 × 580</strong>
      <div class="flex gap-2">
        <div class="join">
          <button class="btn btn-sm join-item" type="button" data-locale-button="en">EN</button>
          <button class="btn btn-sm join-item" type="button" data-locale-button="ko">KO</button>
        </div>
        <div class="join">
          <button class="btn btn-sm join-item" type="button" data-theme-button="focuswhale-preview">Dark</button>
          <button class="btn btn-sm join-item" type="button" data-theme-button="focuswhale-preview-light">Light</button>
        </div>
      </div>
    </nav>

    <main class="mockup-gallery">
      <header class="mx-auto max-w-2xl space-y-2 text-center text-white">
        <p class="text-sm font-bold uppercase text-primary">Session is the toolbar job</p>
        <h1 class="text-3xl font-black" data-locale="en">Choose once. Then focus.</h1>
        <h1 class="text-3xl font-black" data-locale="ko">한 번 정하고, 바로 집중.</h1>
      </header>

      <div class="mockup-grid">
        <figure class="mockup-figure">
          <div class="popup-frame fw-depth flex flex-col bg-base-300 text-base-content" data-theme-surface data-theme="focuswhale-preview">
            <header class="flex h-12 shrink-0 items-center justify-between px-4">
              <strong class="text-sm">Focus Dolphin</strong>
              <button class="btn btn-ghost btn-sm min-h-10" type="button" data-locale="en">Settings</button>
              <button class="btn btn-ghost btn-sm min-h-10" type="button" data-locale="ko">설정</button>
            </header>

            <section class="fw-atmosphere mx-3 grid min-h-28 grid-cols-[104px_1fr] items-center overflow-hidden rounded-box border border-primary/10 px-3">
              <div class="grid place-items-center">
                <div class="pet-sprite" style="--pet-row: 7; --pet-duration: 900ms" role="img" aria-label="Happy young dolphin"></div>
              </div>
              <div class="min-w-0 space-y-1.5">
                <p class="truncate text-sm font-bold">Miro</p>
                <p class="text-xs text-base-content/65" data-locale="en">A young dolphin is sailing</p>
                <p class="text-xs text-base-content/65" data-locale="ko">어린 돌고래가 항해 중</p>
                <div class="flex flex-wrap gap-1">
                  <span class="badge badge-primary badge-soft badge-sm" data-locale="en">Day 7</span>
                  <span class="badge badge-primary badge-soft badge-sm" data-locale="ko">7일째</span>
                  <span class="badge badge-soft badge-sm" data-locale="en">Shields 1/2</span>
                  <span class="badge badge-soft badge-sm" data-locale="ko">보호막 1/2</span>
                </div>
              </div>
            </section>

            <section class="flex min-h-0 flex-1 flex-col gap-3 px-4 pt-3">
              <div>
                <h1 class="text-xl font-black" data-locale="en">Start focusing</h1>
                <h1 class="text-xl font-black" data-locale="ko">집중 시작</h1>
                <p class="text-xs text-base-content/60" data-locale="en">Choose once for today, then get started.</p>
                <p class="text-xs text-base-content/60" data-locale="ko">오늘 한 번만 정하고 바로 들어갑니다.</p>
              </div>

              <div class="join grid grid-cols-[44px_1fr_44px]" aria-label="Duration stepper">
                <button class="btn join-item min-h-11 text-xl" type="button" aria-label="Subtract one minute">−</button>
                <div class="join-item grid min-h-11 place-items-center border border-base-100/10 bg-base-200">
                  <span class="text-2xl font-black tabular-nums">25 <small class="text-sm font-semibold" data-locale="en">min</small><small class="text-sm font-semibold" data-locale="ko">분</small></span>
                </div>
                <button class="btn join-item min-h-11 text-xl" type="button" aria-label="Add one minute">+</button>
              </div>

              <button class="flex min-h-11 items-center justify-between gap-3 rounded-field border border-base-100/10 bg-base-200 px-3 text-left" type="button">
                <span class="min-w-0">
                  <span class="block text-xs text-base-content/55" data-locale="en">Targets</span>
                  <span class="block text-xs text-base-content/55" data-locale="ko">대상</span>
                  <span class="block truncate text-sm font-bold" data-locale="en">Default blocklist · 6 sites</span>
                  <span class="block truncate text-sm font-bold" data-locale="ko">기본 차단 목록 · 사이트 6개</span>
                </span>
                <span aria-hidden="true">›</span>
              </button>

              <fieldset class="grid gap-1.5">
                <legend class="text-xs font-bold"><span data-locale="en">Blocking mode</span><span data-locale="ko">차단 방식</span></legend>
                <div class="join grid grid-cols-3">
                  <input class="btn join-item h-auto min-h-11 min-w-0 whitespace-normal px-1 py-1 text-xs leading-4" type="radio" name="idle-intensity" aria-label="Gentle reminder" data-en-label="Gentle reminder" data-ko-label="가벼운 안내" />
                  <input class="btn join-item h-auto min-h-11 min-w-0 whitespace-normal px-1 py-1 text-xs leading-4" type="radio" name="idle-intensity" aria-label="Confirm to continue" data-en-label="Confirm to continue" data-ko-label="확인 후 허용" checked />
                  <input class="btn join-item h-auto min-h-11 min-w-0 whitespace-normal px-1 py-1 text-xs leading-4" type="radio" name="idle-intensity" aria-label="Full block" data-en-label="Full block" data-ko-label="완전 차단" />
                </div>
                <p class="text-xs text-base-content/55" data-locale="en">Adds a short confirmation before temporary access.</p>
                <p class="text-xs text-base-content/55" data-locale="ko">임시 허용 전에 짧은 확인 단계를 둡니다.</p>
              </fieldset>
            </section>

            <footer class="shrink-0 p-4 pt-2">
              <button class="btn btn-primary min-h-11 w-full shadow-sm" type="button" data-locale="en">Start 25 min</button>
              <button class="btn btn-primary min-h-11 w-full shadow-sm" type="button" data-locale="ko">25분 시작</button>
            </footer>
          </div>
          <figcaption>Idle · one duration, one target summary, one dominant Start action. Includes the full English “Confirm to continue” label.</figcaption>
        </figure>

        <figure class="mockup-figure">
          <div class="popup-frame fw-depth flex flex-col bg-base-300 text-base-content" data-theme-surface data-theme="focuswhale-preview">
            <header class="flex h-12 shrink-0 items-center justify-between px-4">
              <strong class="text-sm">Focus Dolphin</strong>
              <span class="badge badge-primary badge-soft" data-locale="en">In progress</span>
              <span class="badge badge-primary badge-soft" data-locale="ko">진행 중</span>
            </header>

            <section class="fw-atmosphere mx-3 flex min-h-56 flex-col items-center justify-center overflow-hidden rounded-box border border-primary/10 px-4 text-center">
              <div class="relative grid h-28 w-28 place-items-center rounded-full border border-primary/30 bg-base-300/35">
                <div class="pet-sprite" style="--pet-row: 12; --pet-duration: 1000ms" role="img" aria-label="Focused young dolphin"></div>
              </div>
              <p class="mt-3 w-[7ch] text-center text-5xl font-black leading-tight tabular-nums">24:37</p>
              <p class="mt-1 text-xs text-base-content/60" data-locale="en">Ends at 3:42 PM</p>
              <p class="mt-1 text-xs text-base-content/60" data-locale="ko">오후 3:42 종료</p>
            </section>

            <section class="grid flex-1 content-start gap-3 px-4 pt-4">
              <div class="grid grid-cols-3 overflow-hidden rounded-box border border-base-100/10 bg-base-200 text-center">
                <div class="p-3">
                  <p class="text-[11px] text-base-content/50" data-locale="en">Targets</p>
                  <p class="text-[11px] text-base-content/50" data-locale="ko">대상</p>
                  <p class="mt-1 truncate text-xs font-bold" data-locale="en">Default list</p>
                  <p class="mt-1 truncate text-xs font-bold" data-locale="ko">기본 목록</p>
                </div>
                <div class="border-x border-base-100/10 p-3">
                  <p class="text-[11px] text-base-content/50" data-locale="en">Mode</p>
                  <p class="text-[11px] text-base-content/50" data-locale="ko">방식</p>
                  <p class="mt-1 text-xs font-bold" data-locale="en">Confirm first</p>
                  <p class="mt-1 text-xs font-bold" data-locale="ko">확인 후 허용</p>
                </div>
                <div class="p-3">
                  <p class="text-[11px] text-base-content/50" data-locale="en">Source</p>
                  <p class="text-[11px] text-base-content/50" data-locale="ko">시작</p>
                  <p class="mt-1 text-xs font-bold" data-locale="en">Manual</p>
                  <p class="mt-1 text-xs font-bold" data-locale="ko">직접 시작</p>
                </div>
              </div>

              <details class="collapse collapse-arrow border border-base-100/10 bg-base-200">
                <summary class="collapse-title min-h-11 py-3 text-sm font-bold"><span data-locale="en">Need a stronger setting?</span><span data-locale="ko">더 단단한 설정이 필요한가요?</span></summary>
              </details>
              <p class="text-center text-xs text-base-content/50" data-locale="en">This session cannot be shortened or weakened.</p>
              <p class="text-center text-xs text-base-content/50" data-locale="ko">진행 중에는 시간을 줄이거나 차단 방식을 낮출 수 없습니다.</p>
            </section>
          </div>
          <figcaption>Active medium · countdown dominates; target, mode, source, and end time remain stable and scannable.</figcaption>
        </figure>

        <figure class="mockup-figure">
          <div class="popup-frame fw-depth flex flex-col bg-base-300 text-base-content" data-theme-surface data-theme="focuswhale-preview">
            <header class="flex h-12 shrink-0 items-center justify-between px-4">
              <strong class="text-sm">Focus Dolphin</strong>
              <span class="badge badge-error badge-soft" data-locale="en">Full block</span>
              <span class="badge badge-error badge-soft" data-locale="ko">완전 차단</span>
            </header>

            <section class="fw-atmosphere mx-3 grid min-h-48 place-items-center overflow-hidden rounded-box border border-primary/10 text-center">
              <div>
                <div class="mx-auto pet-sprite" style="--pet-row: 12; --pet-duration: 1000ms" role="img" aria-label="Focused young dolphin"></div>
                <p class="mt-1 w-[7ch] text-center text-5xl font-black leading-tight tabular-nums">1:18:04</p>
                <p class="mt-1 text-xs text-base-content/60" data-locale="en">Default blocklist · ends 4:36 PM</p>
                <p class="mt-1 text-xs text-base-content/60" data-locale="ko">기본 차단 목록 · 오후 4:36 종료</p>
              </div>
            </section>

            <section class="grid flex-1 content-start gap-3 px-4 pt-4">
              <div class="alert alert-error alert-soft text-sm leading-5">
                <span data-locale="en">Press once more to schedule an emergency end in 5 minutes.</span>
                <span data-locale="ko">한 번 더 누르면 5분 뒤 비상 종료가 예약됩니다.</span>
              </div>
              <p class="text-xs leading-5 text-base-content/60" data-locale="en">Emergency end takes effect after 5 minutes and can be used once per week.</p>
              <p class="text-xs leading-5 text-base-content/60" data-locale="ko">비상 종료는 5분 뒤 적용되며 이번 주 1회만 사용할 수 있습니다.</p>
              <button class="btn btn-primary min-h-11 w-full" type="button" data-locale="en">Keep focusing</button>
              <button class="btn btn-primary min-h-11 w-full" type="button" data-locale="ko">집중 계속하기</button>
              <button class="btn btn-error btn-soft min-h-11 w-full" type="button" data-locale="en">Schedule end in 5 minutes</button>
              <button class="btn btn-error btn-soft min-h-11 w-full" type="button" data-locale="ko">5분 뒤 종료 예약</button>
            </section>
          </div>
          <figcaption>Active hard confirmation · the safe action remains visually dominant; emergency remains two-step, delayed, and weekly bounded.</figcaption>
        </figure>

        <figure class="mockup-figure">
          <div class="popup-frame fw-depth flex flex-col bg-base-300 text-base-content" data-theme-surface data-theme="focuswhale-preview">
            <header class="flex h-12 shrink-0 items-center justify-between px-4">
              <strong class="text-sm">Focus Dolphin</strong>
              <span class="badge badge-success badge-soft" data-locale="en">Session complete</span>
              <span class="badge badge-success badge-soft" data-locale="ko">세션 완료</span>
            </header>

            <section class="fw-atmosphere mx-3 grid min-h-48 grid-cols-[120px_1fr] items-center overflow-hidden rounded-box border border-primary/10 px-3">
              <div class="pet-sprite pet-sprite-lg" style="--pet-row: 17; --pet-duration: 760ms" role="img" aria-label="Celebrating young dolphin"></div>
              <div class="min-w-0">
                <p class="text-xs font-bold uppercase text-primary" data-locale="en">25 minutes complete</p>
                <p class="text-xs font-bold uppercase text-primary" data-locale="ko">25분 집중 완료</p>
                <h1 class="mt-1 break-keep text-2xl font-black leading-tight" data-locale="en">Your focus helped the dolphin grow</h1>
                <h1 class="mt-1 break-keep text-2xl font-black leading-tight" data-locale="ko">집중이 돌고래를 키웠어요</h1>
              </div>
            </section>

            <section class="grid flex-1 content-start gap-4 px-4 pt-4">
              <div class="stats stats-horizontal w-full overflow-hidden bg-base-200 shadow-sm">
                <div class="stat px-4 py-3">
                  <div class="stat-title text-xs" data-locale="en">This session</div>
                  <div class="stat-title text-xs" data-locale="ko">이번 세션</div>
                  <div class="stat-value text-2xl text-primary">+30 XP</div>
                </div>
                <div class="stat px-4 py-3">
                  <div class="stat-title text-xs" data-locale="en">Current stage</div>
                  <div class="stat-title text-xs" data-locale="ko">현재 단계</div>
                  <div class="stat-value text-lg" data-locale="en">Young dolphin</div>
                  <div class="stat-value text-lg" data-locale="ko">어린 돌고래</div>
                </div>
              </div>
              <div class="space-y-2">
                <div class="flex justify-between text-xs font-bold">
                  <span data-locale="en">Until the next growth</span><span data-locale="ko">다음 성장까지</span>
                  <span>70%</span>
                </div>
                <progress class="progress progress-primary h-2 w-full" max="100" value="70">70%</progress>
              </div>
              <div class="flex items-center justify-between rounded-field bg-base-200 px-3 py-2 text-sm">
                <span data-locale="en">New keepsake · First Ripple</span>
                <span data-locale="ko">새 징표 · 첫 물결</span>
                <span class="badge badge-primary badge-soft">New</span>
              </div>
            </section>

            <footer class="shrink-0 p-4 pt-2">
              <button class="btn btn-primary min-h-11 w-full" type="button" data-locale="en">Got it</button>
              <button class="btn btn-primary min-h-11 w-full" type="button" data-locale="ko">확인</button>
            </footer>
          </div>
          <figcaption>Completion · the dolphin and completed time lead; XP is contextual and appears only after completion.</figcaption>
        </figure>
      </div>
    </main>
  </body>
</html>
