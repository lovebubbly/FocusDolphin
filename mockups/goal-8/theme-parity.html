<!doctype html>
<html lang="en" data-theme="focuswhale-preview-light" data-default-theme="focuswhale-preview-light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goal 8 · Light theme parity</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./mockup.css" />
    <link rel="stylesheet" href="./mockup-assets.css" />
    <script defer src="./mockup.js"></script>
  </head>
  <body class="mockup-stage m-0 font-sans">
    <nav class="mockup-controls" aria-label="Mockup controls">
      <a class="btn btn-ghost btn-sm" href="./index.html">← Goal 8</a>
      <strong>Representative light parity</strong>
      <div class="flex gap-2">
        <div class="join"><button class="btn btn-sm join-item" type="button" data-locale-button="en">EN</button><button class="btn btn-sm join-item" type="button" data-locale-button="ko">KO</button></div>
        <div class="join"><button class="btn btn-sm join-item" type="button" data-theme-button="focuswhale-preview">Dark</button><button class="btn btn-sm join-item" type="button" data-theme-button="focuswhale-preview-light">Light</button></div>
      </div>
    </nav>

    <main class="mockup-gallery">
      <header class="mx-auto max-w-2xl space-y-2 text-center text-white">
        <p class="text-sm font-bold uppercase text-primary">Dark-first, not dark-only</p>
        <h1 class="text-3xl font-black" data-locale="en">The same hierarchy survives in light mode.</h1>
        <h1 class="text-3xl font-black" data-locale="ko">라이트 모드에서도 같은 위계가 유지됩니다.</h1>
      </header>

      <div class="mockup-grid">
        <figure class="mockup-figure">
          <div class="popup-frame fw-depth flex flex-col bg-base-300 text-base-content" data-theme-surface data-theme="focuswhale-preview-light">
            <header class="flex h-12 items-center justify-between px-4"><strong class="text-sm">Focus Dolphin</strong><button class="btn btn-ghost btn-sm min-h-10" type="button" data-locale="en">Settings</button><button class="btn btn-ghost btn-sm min-h-10" type="button" data-locale="ko">설정</button></header>
            <section class="fw-atmosphere mx-3 grid min-h-36 grid-cols-[112px_1fr] items-center rounded-box border border-primary/10 px-3">
              <div class="pet-sprite" style="--pet-row: 7; --pet-duration: 900ms" role="img" aria-label="Happy young dolphin"></div>
              <div><strong>Miro</strong><p class="mt-1 text-sm text-base-content/60" data-locale="en">A young dolphin is sailing</p><p class="mt-1 text-sm text-base-content/60" data-locale="ko">어린 돌고래가 항해 중</p><span class="badge badge-primary badge-soft mt-2" data-locale="en">Day 7</span><span class="badge badge-primary badge-soft mt-2" data-locale="ko">7일째</span></div>
            </section>
            <section class="grid flex-1 content-start gap-4 px-4 pt-4">
              <div><h1 class="text-xl font-black" data-locale="en">Start focusing</h1><h1 class="text-xl font-black" data-locale="ko">집중 시작</h1><p class="text-xs text-base-content/60" data-locale="en">Choose once for today, then get started.</p><p class="text-xs text-base-content/60" data-locale="ko">오늘 한 번만 정하고 바로 들어갑니다.</p></div>
              <div class="join grid grid-cols-[44px_1fr_44px]"><button class="btn join-item text-xl" type="button">−</button><div class="join-item grid place-items-center border border-base-300 bg-base-100 text-2xl font-black">25 <small class="text-sm" data-locale="en">min</small><small class="text-sm" data-locale="ko">분</small></div><button class="btn join-item text-xl" type="button">+</button></div>
              <div class="rounded-field bg-base-100 p-3"><span class="text-xs text-base-content/50" data-locale="en">Targets</span><span class="text-xs text-base-content/50" data-locale="ko">대상</span><strong class="block text-sm" data-locale="en">Default blocklist · 6 sites</strong><strong class="block text-sm" data-locale="ko">기본 차단 목록 · 사이트 6개</strong></div>
              <div class="join grid grid-cols-3"><input class="btn join-item h-auto min-h-11 whitespace-normal px-1 text-xs leading-4" type="radio" name="light-intensity" aria-label="Gentle reminder" data-en-label="Gentle reminder" data-ko-label="가벼운 안내" /><input class="btn join-item h-auto min-h-11 whitespace-normal px-1 text-xs leading-4" type="radio" name="light-intensity" aria-label="Confirm to continue" data-en-label="Confirm to continue" data-ko-label="확인 후 허용" checked /><input class="btn join-item h-auto min-h-11 whitespace-normal px-1 text-xs leading-4" type="radio" name="light-intensity" aria-label="Full block" data-en-label="Full block" data-ko-label="완전 차단" /></div>
            </section>
            <footer class="p-4"><button class="btn btn-primary min-h-11 w-full" type="button" data-locale="en">Start 25 min</button><button class="btn btn-primary min-h-11 w-full" type="button" data-locale="ko">25분 시작</button></footer>
          </div>
          <figcaption>Session idle · light theme keeps the same atmospheric hero and single Start action.</figcaption>
        </figure>

        <figure class="mockup-figure">
          <div class="narrow-frame fw-depth bg-base-300 p-5 text-base-content" data-theme-surface data-theme="focuswhale-preview-light">
            <header><strong class="text-sm">Focus Dolphin</strong><h1 class="mt-5 text-3xl font-black" data-locale="en">Rules</h1><h1 class="mt-5 text-3xl font-black" data-locale="ko">규칙</h1><p class="text-sm text-base-content/60" data-locale="en">Future sessions, in one glance.</p><p class="text-sm text-base-content/60" data-locale="ko">앞으로의 세션을 한눈에.</p></header>
            <section class="mt-6 grid gap-3 overflow-hidden">
              <div class="flex items-center gap-2 overflow-hidden rounded-box border border-base-300 bg-base-100 p-4"><label class="grid min-h-10 min-w-10 cursor-pointer place-items-center"><input class="toggle toggle-primary" type="checkbox" checked aria-label="Monday to Friday 09:00 schedule enabled" data-en-label="Monday to Friday 09:00 schedule enabled" data-ko-label="월요일부터 금요일 09시 일정 사용" /></label><div class="min-w-0 flex-1"><strong data-locale="en">Mon–Fri · 09:00–12:00</strong><strong data-locale="ko">월–금 · 09:00–12:00</strong><p class="mt-1 break-words text-xs text-base-content/60" data-locale="en">Default blocklist · Confirm to continue</p><p class="mt-1 break-words text-xs text-base-content/60" data-locale="ko">기본 차단 목록 · 확인 후 허용</p></div><button class="btn btn-ghost btn-sm min-h-10" type="button" data-locale="en">Edit</button><button class="btn btn-ghost btn-sm min-h-10" type="button" data-locale="ko">수정</button></div>
              <div class="flex items-center gap-2 overflow-hidden rounded-box border border-base-300 bg-base-100 p-4 opacity-70"><label class="grid min-h-10 min-w-10 cursor-pointer place-items-center"><input class="toggle toggle-primary" type="checkbox" aria-label="Saturday and Sunday 10:00 schedule disabled" data-en-label="Saturday and Sunday 10:00 schedule disabled" data-ko-label="토요일과 일요일 10시 일정 중지" /></label><div class="min-w-0 flex-1"><strong data-locale="en">Sat–Sun · 10:00–12:00</strong><strong data-locale="ko">토–일 · 10:00–12:00</strong><p class="mt-1 break-words text-xs text-base-content/60" data-locale="en">Research allowlist · Gentle reminder</p><p class="mt-1 break-words text-xs text-base-content/60" data-locale="ko">리서치 허용 목록 · 가벼운 안내</p></div><button class="btn btn-ghost btn-sm min-h-10" type="button" data-locale="en">Edit</button><button class="btn btn-ghost btn-sm min-h-10" type="button" data-locale="ko">수정</button></div>
              <button class="btn btn-primary mt-2 min-h-11 w-full" type="button" data-locale="en">New schedule</button><button class="btn btn-primary mt-2 min-h-11 w-full" type="button" data-locale="ko">일정 만들기</button>
            </section>
          </div>
          <figcaption>Rules narrow · compact rows, no giant stacked cards, and one creation CTA.</figcaption>
        </figure>

        <figure class="mockup-figure">
          <div class="narrow-frame fw-depth grid place-items-center bg-base-300 p-5 text-base-content" data-theme-surface data-theme="focuswhale-preview-light">
            <section class="card w-full border border-base-300 bg-base-100 shadow-xl">
              <div class="card-body items-center gap-5 text-center">
                <div class="pet-sprite" style="--pet-row: 12; --pet-duration: 1000ms" role="img" aria-label="Focused young dolphin"></div>
                <h1 class="text-2xl font-black" data-locale="en">Focus session in progress</h1><h1 class="text-2xl font-black" data-locale="ko">집중 세션이 진행 중입니다</h1>
                <div class="stats stats-horizontal w-full bg-base-200 text-left"><div class="stat px-3"><div class="stat-title" data-locale="en">Site</div><div class="stat-title" data-locale="ko">대상</div><div class="stat-value text-base">x.com</div></div><div class="stat px-3"><div class="stat-title" data-locale="en">Time left</div><div class="stat-title" data-locale="ko">남은 시간</div><div class="stat-value text-xl">24:37</div></div></div>
                <p class="text-sm text-base-content/60" data-locale="en">Take a brief check-in before opening this site.</p><p class="text-sm text-base-content/60" data-locale="ko">열기 전에 짧은 확인 시간을 둡니다.</p>
                <button class="btn btn-primary min-h-11 w-full" type="button" data-locale="en">Return to focus</button><button class="btn btn-primary min-h-11 w-full" type="button" data-locale="ko">집중으로 돌아가기</button>
                <button class="btn btn-ghost min-h-11 w-full" type="button" data-locale="en">Open anyway</button><button class="btn btn-ghost min-h-11 w-full" type="button" data-locale="ko">그래도 열기</button>
              </div>
            </section>
          </div>
          <figcaption>Blocked medium · AA-oriented light contrast and the same wellness-first action order.</figcaption>
        </figure>
      </div>
    </main>
  </body>
</html>
