<!doctype html>
<html lang="en" data-theme="focuswhale-preview">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goal 8 · Review</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./mockup.css" />
    <link rel="stylesheet" href="./mockup-assets.css" />
    <script defer src="./mockup.js"></script>
  </head>
  <body class="mockup-stage m-0 font-sans">
    <nav class="mockup-controls" aria-label="Mockup controls">
      <a class="btn btn-ghost btn-sm" href="./index.html">← Goal 8</a>
      <strong>Review · truthful local records</strong>
      <div class="flex gap-2">
        <div class="join">
          <button class="btn btn-sm join-item" type="button" data-locale-button="en">EN</button>
          <button class="btn btn-sm join-item" type="button" data-locale-button="ko">KO</button>
        </div>
        <div class="join">
          <button class="btn btn-sm join-item" type="button" data-theme-button="focuswhale-preview">Dark</button>
          <button class="btn btn-sm join-item" type="button" data-theme-button="focuswhale-preview-light">Light</button>
        </div>
      </div>
    </nav>

    <main class="mockup-gallery">
      <header class="mx-auto max-w-2xl space-y-2 text-center text-white">
        <p class="text-sm font-bold uppercase text-primary">Understand the day</p>
        <h1 class="text-3xl font-black" data-locale="en">Progress without judgment.</h1>
        <h1 class="text-3xl font-black" data-locale="ko">평가하지 않고, 변화를 이해하기.</h1>
      </header>

      <div class="mockup-grid mockup-grid-wide">
        <figure class="mockup-figure">
          <div class="desktop-frame fw-depth bg-base-300 text-base-content" data-theme-surface data-theme="focuswhale-preview">
            <main class="mx-auto grid w-full max-w-[720px] gap-7 px-5 py-8">
              <header class="flex items-start justify-between gap-5">
                <div class="space-y-1">
                  <p class="text-sm font-bold">Focus Dolphin</p>
                  <h1 class="text-3xl font-black" data-locale="en">Review</h1>
                  <h1 class="text-3xl font-black" data-locale="ko">리뷰</h1>
                  <p class="text-sm text-base-content/60" data-locale="en">Local records from completed sessions and interventions.</p>
                  <p class="text-sm text-base-content/60" data-locale="ko">완료한 세션과 개입에서 남은 로컬 기록입니다.</p>
                </div>
                <button class="btn btn-ghost min-h-10" type="button" data-locale="en">Preferences</button>
                <button class="btn btn-ghost min-h-10" type="button" data-locale="ko">환경설정</button>
              </header>

              <div class="tabs tabs-box bg-base-200 p-1" role="tablist" aria-label="Options sections">
                <button class="tab tab-active min-h-10 flex-1" role="tab" type="button" aria-selected="true" data-locale="en">Review</button>
                <button class="tab tab-active min-h-10 flex-1" role="tab" type="button" aria-selected="true" data-locale="ko">리뷰</button>
                <button class="tab min-h-10 flex-1" role="tab" type="button" data-locale="en">Rules</button>
                <button class="tab min-h-10 flex-1" role="tab" type="button" data-locale="ko">규칙</button>
              </div>

              <section class="fw-atmosphere fw-depth grid min-h-56 grid-cols-1 items-center overflow-hidden rounded-box border border-primary/10 p-5 text-center sm:grid-cols-[170px_1fr] sm:text-left">
                <div class="grid place-items-center">
                  <div class="pet-sprite pet-sprite-xl" style="--pet-row: 7; --pet-duration: 900ms" role="img" aria-label="Happy young dolphin"></div>
                </div>
                <div class="min-w-0 space-y-3">
                  <p class="text-sm font-bold text-primary" data-locale="en">This week</p>
                  <p class="text-sm font-bold text-primary" data-locale="ko">이번 주</p>
                  <div class="flex flex-wrap items-baseline justify-center gap-2 sm:justify-start">
                    <span class="text-5xl font-black tabular-nums">145</span>
                    <span class="font-bold" data-locale="en">focus min</span>
                    <span class="font-bold" data-locale="ko">집중 분</span>
                  </div>
                  <p class="text-sm text-base-content/65" data-locale="en">Six completed sessions helped Miro keep growing.</p>
                  <p class="text-sm text-base-content/65" data-locale="ko">완료한 세션 6번이 미로의 성장을 이어 주었어요.</p>
                  <div class="flex flex-wrap gap-2">
                    <span class="badge badge-primary badge-soft" data-locale="en">Day 7</span>
                    <span class="badge badge-primary badge-soft" data-locale="ko">7일째</span>
                    <span class="badge badge-soft" data-locale="en">Shields 1/2</span>
                    <span class="badge badge-soft" data-locale="ko">보호막 1/2</span>
                    <span class="badge badge-soft" data-locale="en">Young dolphin</span>
                    <span class="badge badge-soft" data-locale="ko">어린 돌고래</span>
                  </div>
                </div>
              </section>

              <section aria-label="Review totals">
                <div class="stats stats-horizontal w-full overflow-hidden bg-base-100 shadow-sm">
                  <div class="stat px-4 py-3">
                    <div class="stat-title" data-locale="en">Focus minutes</div>
                    <div class="stat-title" data-locale="ko">집중 분</div>
                    <div class="stat-value text-2xl tabular-nums">145</div>
                  </div>
                  <div class="stat px-4 py-3">
                    <div class="stat-title" data-locale="en">Completed</div>
                    <div class="stat-title" data-locale="ko">완료 세션</div>
                    <div class="stat-value text-2xl tabular-nums">6</div>
                  </div>
                  <div class="stat px-4 py-3">
                    <div class="stat-title" data-locale="en">Blocked attempts</div>
                    <div class="stat-title" data-locale="ko">차단 시도</div>
                    <div class="stat-value text-2xl tabular-nums">12</div>
                  </div>
                  <div class="stat px-4 py-3">
                    <div class="stat-title" data-locale="en">Temporary access</div>
                    <div class="stat-title" data-locale="ko">임시 허용</div>
                    <div class="stat-value text-2xl tabular-nums">2</div>
                  </div>
                </div>
              </section>

              <section class="grid gap-4 md:grid-cols-[1.25fr_0.75fr]">
                <div class="space-y-4 rounded-box border border-base-100/10 bg-base-100 p-4">
                  <div>
                    <h2 class="font-black" data-locale="en">Eight-week focus</h2>
                    <h2 class="font-black" data-locale="ko">8주 집중 흐름</h2>
                    <p class="text-xs text-base-content/55" data-locale="en">Completed focus minutes by week</p>
                    <p class="text-xs text-base-content/55" data-locale="ko">주별 완료 집중 시간</p>
                  </div>
                  <div class="grid h-36 grid-cols-8 items-end gap-2" aria-label="Eight-week focus chart">
                    <div class="h-[28%] rounded-field bg-primary/25" title="40 minutes"></div>
                    <div class="h-[42%] rounded-field bg-primary/30" title="60 minutes"></div>
                    <div class="h-[36%] rounded-field bg-primary/30" title="52 minutes"></div>
                    <div class="h-[58%] rounded-field bg-primary/40" title="82 minutes"></div>
                    <div class="h-[52%] rounded-field bg-primary/45" title="74 minutes"></div>
                    <div class="h-[72%] rounded-field bg-primary/55" title="104 minutes"></div>
                    <div class="h-[64%] rounded-field bg-primary/60" title="92 minutes"></div>
                    <div class="h-full rounded-field bg-primary" title="145 minutes"></div>
                  </div>
                </div>

                <div class="space-y-4 rounded-box border border-base-100/10 bg-base-100 p-4">
                  <div>
                    <h2 class="font-black" data-locale="en">Attempted targets</h2>
                    <h2 class="font-black" data-locale="ko">차단 시도 대상</h2>
                    <p class="text-xs text-base-content/55" data-locale="en">Blocked attempts, not passive browsing</p>
                    <p class="text-xs text-base-content/55" data-locale="ko">수동 사용 시간이 아닌 차단 시도 기록</p>
                  </div>
                  <div class="space-y-3 text-sm">
                    <div><div class="flex justify-between"><span>youtube.com</span><strong>5</strong></div><progress class="progress progress-primary h-1.5 w-full" max="5" value="5"></progress></div>
                    <div><div class="flex justify-between"><span>x.com</span><strong>4</strong></div><progress class="progress progress-primary h-1.5 w-full" max="5" value="4"></progress></div>
                    <div><div class="flex justify-between"><span>instagram.com</span><strong>3</strong></div><progress class="progress progress-primary h-1.5 w-full" max="5" value="3"></progress></div>
                  </div>
                </div>
              </section>

              <section class="grid gap-3 border-t border-base-100/10 pt-5">
                <div class="flex flex-col items-start gap-3 sm:flex-row sm:items-center sm:justify-between sm:gap-4">
                  <div>
                    <h2 class="text-xl font-black" data-locale="en">Dolphin growth</h2>
                    <h2 class="text-xl font-black" data-locale="ko">돌고래 성장</h2>
                    <p class="text-sm text-base-content/60" data-locale="en">Growth never reverses and rest never harms the dolphin.</p>
                    <p class="text-sm text-base-content/60" data-locale="ko">성장은 돌아가지 않고, 쉬는 날도 돌고래를 해치지 않습니다.</p>
                  </div>
                  <span class="badge badge-primary badge-soft whitespace-nowrap" data-locale="en">Latest · First Ripple</span>
                  <span class="badge badge-primary badge-soft whitespace-nowrap" data-locale="ko">최근 · 첫 물결</span>
                </div>
                <div class="grid gap-3 sm:grid-cols-[1fr_auto] sm:items-center">
                  <div>
                    <div class="flex justify-between text-xs font-bold"><span data-locale="en">Toward Blue dolphin</span><span data-locale="ko">푸른 돌고래까지</span><span>70%</span></div>
                    <progress class="progress progress-primary mt-2 h-2 w-full" max="100" value="70"></progress>
                  </div>
                  <button class="btn btn-soft btn-sm min-h-10" type="button" data-locale="en">Growth details</button>
                  <button class="btn btn-soft btn-sm min-h-10" type="button" data-locale="ko">성장 자세히</button>
                </div>
              </section>
            </main>
          </div>
          <figcaption>Populated Review · focus and intervention records are explicit; dolphin growth is one companion section rather than a competing dashboard.</figcaption>
        </figure>

        <figure class="mockup-figure">
          <div class="narrow-frame fw-depth flex flex-col bg-base-300 px-4 py-6 text-base-content" data-theme-surface data-theme="focuswhale-preview">
            <header>
              <p class="text-sm font-bold">Focus Dolphin</p>
              <h1 class="mt-4 text-3xl font-black" data-locale="en">Review</h1>
              <h1 class="mt-4 text-3xl font-black" data-locale="ko">리뷰</h1>
            </header>
            <section class="fw-atmosphere mt-6 flex flex-1 flex-col items-center justify-center rounded-box border border-primary/10 p-6 text-center">
              <div class="pet-sprite pet-sprite-lg" style="--pet-row: 5; --pet-duration: 900ms" role="img" aria-label="Happy egg"></div>
              <p class="mt-5 text-5xl font-black tabular-nums">0</p>
              <h2 class="mt-2 text-xl font-black" data-locale="en">Your first review starts after a session</h2>
              <h2 class="mt-2 text-xl font-black" data-locale="ko">첫 세션이 끝나면 리뷰가 시작돼요</h2>
              <p class="mt-2 max-w-xs text-sm leading-6 text-base-content/65" data-locale="en">Completed focus minutes and intervention records will appear here. Nothing is sent outside the browser.</p>
              <p class="mt-2 max-w-xs text-sm leading-6 text-base-content/65" data-locale="ko">완료한 집중 시간과 개입 기록이 여기에 나타납니다. 브라우저 밖으로 전송하지 않습니다.</p>
              <button class="btn btn-primary mt-6 min-h-11 w-full" type="button" data-locale="en">Open Session from the toolbar</button>
              <button class="btn btn-primary mt-6 min-h-11 w-full" type="button" data-locale="ko">도구 모음에서 세션 열기</button>
            </section>
          </div>
          <figcaption>Empty Review · informative and non-punitive; it does not fabricate a score or imply failure.</figcaption>
        </figure>
      </div>
    </main>
  </body>
</html>
