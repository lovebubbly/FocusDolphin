<!doctype html>
<html lang="ko" data-theme="emerald">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusWhale Mockup · Blocked and Overlay</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      .pet-sprite {
        width: 96px;
        height: 96px;
        background-image: url("../assets/sprites/focuswhale-atlas.png");
        background-size: 384px 960px;
        background-position: 0 calc(var(--pet-row, 0) * -96px);
        animation: pet-swim 1200ms steps(4) infinite;
      }

      @keyframes pet-swim {
        to { background-position-x: -384px; }
      }

      @media (prefers-reduced-motion: reduce) {
        .pet-sprite { animation: none; }
      }
    </style>
  </head>
  <body class="m-0 bg-base-200 font-sans text-base-content">
    <main class="grid min-h-screen place-items-center gap-8 p-6">
      <section class="card w-full max-w-lg border border-base-200 bg-base-100 shadow-xl" aria-labelledby="blocked-title">
        <div class="card-body gap-5">
          <div class="grid place-items-center">
            <div class="rounded-box grid h-28 w-28 place-items-center bg-base-200">
              <div class="pet-sprite" role="img" aria-label="FocusWhale pet stage 1 idle" style="--pet-row: 1"></div>
            </div>
          </div>

          <div class="text-center">
            <p class="text-xs font-bold uppercase tracking-wide text-base-content/50">FocusWhale</p>
            <h1 id="blocked-title" class="mt-1 text-3xl font-extrabold">집중 세션이 진행 중입니다</h1>
          </div>

          <div class="stats stats-horizontal bg-base-200">
            <div class="stat">
              <div class="stat-title">대상</div>
              <div class="stat-value text-base tabular-nums">youtube.com</div>
            </div>
            <div class="stat">
              <div class="stat-title">남은 시간</div>
              <div class="stat-value text-2xl tabular-nums">0:40</div>
            </div>
          </div>

          <div class="space-y-3">
            <p class="text-sm text-base-content/60">열기 전에 짧은 확인 시간을 둡니다.</p>
            <button class="btn btn-primary w-full">그래도 열기</button>
            <button class="btn btn-ghost w-full">되돌아가기</button>
          </div>
        </div>
      </section>

      <section class="w-full max-w-lg space-y-3" aria-label="Blocked state variants">
        <div class="collapse collapse-arrow border border-base-300 bg-base-100">
          <input type="radio" name="blocked-state" />
          <div class="collapse-title text-sm font-semibold">medium 마찰 단계</div>
          <div class="collapse-content">
            <fieldset class="fieldset">
              <legend class="fieldset-legend">열어야 하는 이유</legend>
              <input class="input w-full" type="text" />
            </fieldset>
            <button class="btn btn-outline w-full" disabled>0:30</button>
          </div>
        </div>
        <div class="collapse collapse-arrow border border-base-300 bg-base-100">
          <input type="radio" name="blocked-state" />
          <div class="collapse-title text-sm font-semibold">hard 상태</div>
          <div class="collapse-content">
            <div class="alert">
              <span>hard 세션에서는 임시 허용을 제공하지 않습니다.</span>
            </div>
            <button class="btn btn-outline w-full">비상 종료 요청</button>
          </div>
        </div>
        <div class="collapse collapse-arrow border border-base-300 bg-base-100">
          <input type="radio" name="blocked-state" />
          <div class="collapse-title text-sm font-semibold">soft 오버레이</div>
          <div class="collapse-content">
            <div class="rounded-box bg-base-300/70 p-4">
              <div class="card mx-auto max-w-sm bg-base-100 shadow-xl">
                <div class="card-body gap-4">
                  <p class="text-sm text-base-content/60">기본 차단 목록 · youtube.com</p>
                  <h2 class="card-title">잠시 멈춤</h2>
                  <p class="text-sm text-base-content/60">이 세션에서는 이 사이트를 열기 전에 짧은 확인 시간을 둡니다.</p>
                  <button class="btn btn-outline">되돌아가기</button>
                  <button class="btn btn-ghost" disabled>계속하기 10</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
